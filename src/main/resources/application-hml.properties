spring.application.name=gestao-hml

# ─── Banco de Dados PostgreSQL (Homologação) ────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://187.77.46.129:5433/igreja_hml}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:ipdosipes}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=gestao_hml

# ─── Multipart / Upload ────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_FILE_SIZE:10MB}

# ─── Porta do servidor ─────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── Proxy Reverso (Easypanel / Nginx) ────────────────────────────────────────
server.forward-headers-strategy=framework
