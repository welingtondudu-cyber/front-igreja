spring.application.name=gestao

# ─── Banco de Dados PostgreSQL ─────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://187.77.46.129:5433/igreja}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:ipdosipes}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=gestao

# ─── Multipart / Upload ────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_FILE_SIZE:10MB}

# ─── Porta do servidor ─────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── Proxy Reverso (Easypanel / Nginx) ────────────────────────────────────────
# Faz o Spring Boot respeitar o X-Forwarded-Proto do proxy,
# corrigindo URLs geradas pelo Swagger para https://
server.forward-headers-strategy=framework

# ─── Tomcat Post Size Limit ───────────────────────────────────────────────────
server.tomcat.max-http-form-post-size=52428800
server.tomcat.max-post-size=52428800

